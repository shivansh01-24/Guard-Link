<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardLink | Authentication</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="auth-main">
        <div class="glass-card auth-card">
            <div class="auth-header">
                <span class="shield-icon">🛡️</span>
                <h1>GuardLink</h1>
                <p id="auth-title">Welcome Back</p>
            </div>

            <form id="auth-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group password-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                    <div class="show-password-container">
                        <input type="checkbox" id="show-password">
                        <label for="show-password">Show Password</label>
                    </div>
                </div>
                <button type="submit" id="auth-submit-btn">
                    <span class="btn-text">Sign In</span>
                    <div class="loader hidden"></div>
                </button>
            </form>

            <div class="auth-footer">
                <p id="toggle-text">Don't have an account? <a href="#" id="toggle-auth">Create one</a></p>
            </div>
            
            <a href="index.html" class="back-link">← Back to Home</a>
        </div>
    </main>

    <script>
        const authForm = document.getElementById('auth-form');
        const authTitle = document.getElementById('auth-title');
        const submitBtn = document.getElementById('auth-submit-btn');
        const btnText = submitBtn.querySelector('.btn-text');
        const toggleAuth = document.getElementById('toggle-auth');
        const toggleText = document.getElementById('toggle-text');

        let isLogin = true;

        const passwordInput = document.getElementById('password');
        const showPasswordCheckbox = document.getElementById('show-password');

        showPasswordCheckbox.addEventListener('change', () => {
            passwordInput.type = showPasswordCheckbox.checked ? 'text' : 'password';
        });

        function handleToggle(e) {
            e.preventDefault();
            isLogin = !isLogin;
            authTitle.textContent = isLogin ? 'Welcome Back' : 'Create Account';
            btnText.textContent = isLogin ? 'Sign In' : 'Sign Up';
            toggleText.innerHTML = isLogin 
                ? 'Don\'t have an account? <a href="#" id="toggle-auth">Create one</a>'
                : 'Already have an account? <a href="#" id="toggle-auth">Log in</a>';
            
            // Re-attach listener because we replaced the innerHTML
            document.getElementById('toggle-auth').addEventListener('click', handleToggle);
        }

        toggleAuth.addEventListener('click', handleToggle);

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            submitBtn.disabled = true;
            submitBtn.querySelector('.loader').classList.remove('hidden');

            const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userEmail', data.user.email);
                    window.location.href = 'index.html';
                } else {
                    alert(data.error || 'Authentication failed');
                }
            } catch (err) {
                alert('An error occurred');
            } finally {
                submitBtn.disabled = false;
                submitBtn.querySelector('.loader').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
