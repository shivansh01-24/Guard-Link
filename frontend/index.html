<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardLink | Web Vulnerability Scanner</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav>
        <div class="logo">
            <span class="shield-icon">🛡️</span>
            <h1>GuardLink</h1>
        </div>
        <div class="nav-links" id="nav-actions">
            <a href="#scanner">Scanner</a>
            <a href="#history">Historical Logs</a>
            <!-- Auth content will be injected by app.js -->
        </div>
    </nav>

    <main>
        <section id="scanner" class="hero">
            <div class="glass-card scanner-box">
                <h2>Analyze Security</h2>
                <p>Identify critical OWASP vulnerabilities in seconds.</p>
                <form id="scan-form">
                    <div class="input-group">
                        <input type="text" id="url-input" placeholder="https://example.com" required>
                        <button type="submit" id="scan-btn">
                            <span class="btn-text">Start Scan</span>
                            <div class="loader hidden"></div>
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <section id="results-area" class="results-section hidden">
            <div class="glass-card results-container">
                <div class="results-header">
                    <h3>Scan Results</h3>
                    <span id="target-url" class="badge-url"></span>
                </div>
                <div id="vulnerability-list" class="vulnerability-grid">
                    <!-- Results populated by JS -->
                </div>
            </div>
        </section>

        <section id="history" class="history-section">
            <div class="glass-container">
                <h3>Recent Scans</h3>
                <div class="table-wrapper">
                    <table id="history-table">
                        <thead>
                            <tr>
                                <th>URL</th>
                                <th>Issues Found</th>
                                <th>Detected At</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="history-body">
                            <!-- History populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 GuardLink Security Engine. Educational Use Only.</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
